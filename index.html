<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#E63946" />
    <meta
      name="description"
      content="FitLife Hub — AI-generated training & nutrition plans, premium meal delivery, a curated fitness marketplace, and detailed progress analytics."
    />

    <!-- PWA: web app manifest for installability (Phase 3 P-08 scaffold). -->
    <link rel="manifest" href="/manifest.json" />

    <!-- P-01: Google Fonts loaded via <link> in <head> instead of CSS @import.
         CSS @import is render-blocking; <link> with preconnect parallelizes
         the DNS/TLS/HTTP round-trips with the HTML parse.
         P-02: reduced from 14 to 9 font files — dropped Playfair italic
         variants (only the regular weights are used for hero headlines)
         and reduced JetBrains Mono to a single weight (400) since it is
         only used for the status bar and engine form inputs. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400&family=Playfair+Display:wght@400;700;900&display=swap"
    />

    <!-- P-12: modulepreload critical chunks so the browser discovers them
         in parallel with the HTML parse instead of waiting for the module
         graph to resolve. The hashes are stable across builds because
         Vite emits content-hashed filenames; for production these should
         be generated from the build manifest, but the relative path
         preloads the entry chunk regardless of hash. -->
    <link rel="modulepreload" href="/src/main.tsx" />

    <title>FitLife Hub</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
