# Dependabot — weekly dependency update PRs for npm and GitHub Actions.
version: 2
updates:
  # npm dependencies (runtime + dev)
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Africa/Addis_Ababa
    open-pull-requests-limit: 10
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
    commit-message:
      prefix: deps
      include: scope
    labels:
      - dependencies
      - automated

  # GitHub Actions versions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: ci
      include: scope
    labels:
      - dependencies
      - automated
